version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: querysense-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: querysense
      MYSQL_USER: querysense_user
      MYSQL_PASSWORD: querysense_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password

  # We'll add Qdrant in Phase 3
  # qdrant:
  #   image: qdrant/qdrant
  #   ports:
  #     - "6333:6333"

volumes:
  mysql_data:
